[build]
  command = "npm run build"
  publish = "public"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--production=false"
  GATSBY_CPU_COUNT = "2"
  # Enable Gatsby incremental page builds on Netlify to reduce build duration
  GATSBY_EXPERIMENTAL_PAGE_BUILD_ON_DATA_CHANGES = "true"

# Disable Netlify post-processing during build (forms/assets) to avoid extra time
[build.processing]
  skip_processing = true

# Alternatively, fine-grained (kept for compatibility with older images)
[build.processing.forms]
  enabled = false

[build.processing.css]
  bundle = false
  minify = false

[build.processing.js]
  bundle = false
  minify = false

[build.processing.html]
  pretty_urls = false

[build.processing.images]
  compress = false

[[redirects]]
  from = "/en"
  to = "/en/home"
  status = 301
  force = false
  query = {path = ":path"}
  conditions = {Language = ["en"]}